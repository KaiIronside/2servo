<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎯 Target Shooter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0c0f;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    cursor: none;
    user-select: none;
  }

  #gameCanvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }

  #ui {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 16px 24px;
    pointer-events: none;
    z-index: 10;
  }

  .stat-box {
    background: rgba(0,0,0,0.7);
    border: 1px solid rgba(255,220,50,0.4);
    border-radius: 4px;
    padding: 8px 16px;
    text-align: center;
  }

  .stat-label {
    font-size: 10px;
    color: rgba(255,220,50,0.6);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .stat-value {
    font-family: 'Orbitron', monospace;
    font-size: 24px;
    font-weight: 700;
    color: #ffdc32;
  }

  #timerBar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 6px;
    background: rgba(255,255,255,0.1);
    z-index: 10;
    pointer-events: none;
  }

  #timerFill {
    height: 100%;
    background: linear-gradient(90deg, #00ff88, #ffdc32, #ff4444);
    background-size: 300% 100%;
    transition: width 0.05s linear;
    border-radius: 0 3px 3px 0;
  }

  #crosshairInfo {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 1px;
    pointer-events: none;
  }

  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }

  #overlay h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(32px, 6vw, 72px);
    font-weight: 900;
    color: #ffdc32;
    letter-spacing: 4px;
    margin-bottom: 8px;
    text-shadow: 0 0 40px rgba(255,220,50,0.5);
  }

  #overlay .sub {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 3px;
    margin-bottom: 48px;
  }

  .score-display {
    font-family: 'Orbitron', monospace;
    font-size: clamp(48px, 10vw, 120px);
    font-weight: 900;
    color: #fff;
    line-height: 1;
    margin-bottom: 8px;
  }

  .score-label {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 3px;
    margin-bottom: 40px;
  }

  .stats-row {
    display: flex;
    gap: 32px;
    margin-bottom: 48px;
  }

  .stat-item {
    text-align: center;
  }

  .stat-item .val {
    font-family: 'Orbitron', monospace;
    font-size: 28px;
    font-weight: 700;
    color: #ffdc32;
  }

  .stat-item .lbl {
    font-size: 10px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 2px;
    margin-top: 4px;
  }

  .btn-start {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 3px;
    padding: 14px 48px;
    background: transparent;
    border: 2px solid #ffdc32;
    color: #ffdc32;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .btn-start:hover {
    background: #ffdc32;
    color: #0a0c0f;
    box-shadow: 0 0 30px rgba(255,220,50,0.4);
  }

  .miss-flash {
    position: fixed;
    inset: 0;
    background: rgba(255,0,0,0.15);
    pointer-events: none;
    z-index: 50;
    opacity: 0;
    transition: opacity 0.05s;
  }

  .hit-flash {
    position: fixed;
    inset: 0;
    background: rgba(0,255,100,0.08);
    pointer-events: none;
    z-index: 50;
    opacity: 0;
    transition: opacity 0.05s;
  }

  #levelBadge {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-family: 'Orbitron', monospace;
    font-size: 48px;
    font-weight: 900;
    color: #ffdc32;
    text-shadow: 0 0 60px rgba(255,220,50,0.8);
    pointer-events: none;
    z-index: 60;
    transition: transform 0.2s, opacity 0.3s;
    opacity: 0;
  }

  .ammo-counter {
    display: flex;
    gap: 4px;
    align-items: center;
    margin-top: 4px;
    justify-content: center;
  }

  .bullet-dot {
    width: 6px;
    height: 10px;
    background: #ffdc32;
    border-radius: 2px;
    display: inline-block;
  }

  .bullet-dot.empty {
    background: rgba(255,220,50,0.2);
  }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui">
  <div class="stat-box">
    <div class="stat-label">Score</div>
    <div class="stat-value" id="scoreDisplay">0</div>
  </div>
  <div class="stat-box">
    <div class="stat-label">Streak</div>
    <div class="stat-value" id="streakDisplay">x1</div>
    <div style="font-size:10px; color:rgba(255,220,50,0.4); margin-top:2px" id="comboDisplay"></div>
  </div>
  <div class="stat-box">
    <div class="stat-label">Time</div>
    <div class="stat-value" id="timeDisplay">5.0</div>
  </div>
</div>

<div id="timerBar"><div id="timerFill" style="width:100%"></div></div>

<div class="miss-flash" id="missFlash"></div>
<div class="hit-flash" id="hitFlash"></div>
<div id="levelBadge"></div>

<div id="crosshairInfo">CLICK TO SHOOT</div>

<div id="overlay">
  <h1>TARGET SHOOTER</h1>
  <div class="sub">PRECISION TRAINING SIMULATOR</div>
  <div class="score-display" id="finalScore" style="display:none">0</div>
  <div class="score-label" id="finalLabel" style="display:none">FINAL SCORE</div>
  <div class="stats-row" id="finalStats" style="display:none">
    <div class="stat-item"><div class="val" id="fHits">0</div><div class="lbl">Hits</div></div>
    <div class="stat-item"><div class="val" id="fMisses">0</div><div class="lbl">Misses</div></div>
    <div class="stat-item"><div class="val" id="fAcc">0%</div><div class="lbl">Accuracy</div></div>
    <div class="stat-item"><div class="val" id="fBest">0</div><div class="lbl">Best Streak</div></div>
  </div>
  <button class="btn-start" id="startBtn" onclick="startGame()">START GAME</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let W, H;
let mouseX = 0, mouseY = 0;
let gameRunning = false;
let score = 0, streak = 0, bestStreak = 0;
let hits = 0, misses = 0;
let targets = [];
let particles = [];
let muzzleFlash = 0;
let timeLeft = 5.0;
let maxTime = 5.0;
let timerDecay = 0;
let level = 1;
let targetSpawnTime = 0;
let spawnInterval = 0.6;
let maxTargetsOnScreen = 2;
let waveTimer = 0;
let waveCooldown = 0;
let totalHits = 0;
let floatingTexts = [];
let gunRecoil = 0;
let shotRings = [];
let lastTime = 0;
let missedLastShot = false;
let bgStars = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function generateStars() {
  bgStars = [];
  for (let i = 0; i < 200; i++) {
    bgStars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.5,
      a: Math.random() * 0.6 + 0.1
    });
  }
}
generateStars();

window.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

window.addEventListener('click', e => {
  if (!gameRunning) return;
  shoot(e.clientX, e.clientY);
});

window.addEventListener('contextmenu', e => e.preventDefault());

class Target {
  constructor() {
    this.reset();
    this.opacity = 0;
    this.born = Date.now();
    this.hit = false;
    this.hitTime = 0;
    this.scale = 1;
    this.vx = (Math.random() - 0.5) * (1 + level * 0.3);
    this.vy = (Math.random() - 0.5) * (1 + level * 0.3);
    this.rotation = 0;
    this.rotSpeed = (Math.random() - 0.5) * 0.02;
  }

  reset() {
    const margin = 120;
    this.baseRadius = 80 - level * 3;
    if (this.baseRadius < 30) this.baseRadius = 30;
    this.x = margin + Math.random() * (W - margin * 2);
    this.y = margin + Math.random() * (H * 0.65 - margin);
    this.radius = this.baseRadius;
  }

  update(dt) {
    if (this.hit) {
      this.scale += (0 - this.scale) * 0.15;
      this.opacity = Math.max(0, this.opacity - 0.08);
      return;
    }
    this.opacity = Math.min(1, this.opacity + 0.05);
    this.x += this.vx;
    this.y += this.vy;
    this.rotation += this.rotSpeed;

    if (this.x < this.radius || this.x > W - this.radius) this.vx *= -1;
    if (this.y < this.radius || this.y > H * 0.72 - this.radius) this.vy *= -1;
    this.x = Math.max(this.radius, Math.min(W - this.radius, this.x));
    this.y = Math.max(this.radius, Math.min(H * 0.72 - this.radius, this.y));
  }

  getScore(px, py) {
    const dist = Math.hypot(px - this.x, py - this.y);
    const r = this.radius;
    if (dist > r) return 0;
    const ratio = 1 - dist / r;
    if (ratio > 0.8) return 10;
    if (ratio > 0.6) return 8;
    if (ratio > 0.4) return 6;
    if (ratio > 0.2) return 4;
    return 2;
  }

  draw() {
    if (this.opacity <= 0) return;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.scale(this.scale, this.scale);
    ctx.globalAlpha = this.opacity;

    const rings = [
      { r: 1.0,   color: '#1a1a2e', stroke: '#ffffff' },
      { r: 0.8,   color: '#c0392b', stroke: '#ff6b6b' },
      { r: 0.6,   color: '#ffffff', stroke: '#ffffff' },
      { r: 0.4,   color: '#c0392b', stroke: '#ff4444' },
      { r: 0.2,   color: '#ffffff', stroke: '#ffffff' },
      { r: 0.1,   color: '#ffdc32', stroke: '#ffdc32' },
    ];

    for (const ring of rings) {
      ctx.beginPath();
      ctx.arc(0, 0, this.radius * ring.r, 0, Math.PI * 2);
      ctx.fillStyle = ring.color;
      ctx.fill();
      ctx.strokeStyle = ring.stroke;
      ctx.lineWidth = 1.5;
      ctx.globalAlpha = this.opacity * 0.6;
      ctx.stroke();
      ctx.globalAlpha = this.opacity;
    }

    ctx.beginPath();
    ctx.moveTo(-this.radius * 1.2, 0);
    ctx.lineTo(this.radius * 1.2, 0);
    ctx.moveTo(0, -this.radius * 1.2);
    ctx.lineTo(0, this.radius * 1.2);
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.restore();
  }
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 6 + 2;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: Math.random() * 0.04 + 0.03,
      r: Math.random() * 4 + 2,
      color
    });
  }
}

function shoot(px, py) {
  muzzleFlash = 1;
  gunRecoil = 1;

  shotRings.push({ x: px, y: py, r: 0, maxR: 80, life: 1 });

  let hitSomething = false;
  let bestScore = 0;
  let hitTarget = null;

  for (const t of targets) {
    if (t.hit) continue;
    const pts = t.getScore(px, py);
    if (pts > 0) {
      if (pts > bestScore) {
        bestScore = pts;
        hitTarget = t;
      }
      hitSomething = true;
    }
  }

  if (hitTarget) {
    hitTarget.hit = true;
    hitTarget.hitTime = Date.now();
    hits++;
    totalHits++;
    streak++;
    if (streak > bestStreak) bestStreak = streak;

    const multiplier = streak >= 5 ? 3 : streak >= 3 ? 2 : 1;
    const earned = bestScore * multiplier;
    score += earned;

    timeLeft = Math.min(maxTime, timeLeft + 1.5);

    spawnParticles(hitTarget.x, hitTarget.y, bestScore === 10 ? '#ffdc32' : '#ff6b6b', bestScore === 10 ? 20 : 12);

    floatingTexts.push({
      x: hitTarget.x, y: hitTarget.y - hitTarget.radius,
      text: (multiplier > 1 ? `x${multiplier} ` : '') + `+${earned}`,
      color: bestScore === 10 ? '#ffdc32' : '#00ff88',
      life: 1, vy: -2, size: bestScore === 10 ? 32 : 24
    });

    document.getElementById('hitFlash').style.opacity = '1';
    setTimeout(() => document.getElementById('hitFlash').style.opacity = '0', 80);

    updateUI();
  } else {
    misses++;
    streak = 0;
    missedLastShot = true;
    timeLeft = Math.max(0.3, timeLeft - 0.5);

    spawnParticles(px, py, '#444', 6);

    document.getElementById('missFlash').style.opacity = '1';
    setTimeout(() => document.getElementById('missFlash').style.opacity = '0', 120);

    updateUI();
  }
}

function updateUI() {
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('streakDisplay').textContent = 'x' + (streak >= 5 ? 3 : streak >= 3 ? 2 : 1);
  const combo = streak >= 5 ? '🔥 HOT' : streak >= 3 ? 'COMBO' : '';
  document.getElementById('comboDisplay').textContent = combo;
}

function drawGun() {
  const cx = W / 2;
  const cy = H;
  const recoilOffset = gunRecoil * 20;

  ctx.save();
  ctx.translate(cx, cy + recoilOffset);

  const angle = Math.atan2(mouseY - (cy + recoilOffset), mouseX - cx);
  ctx.rotate(angle - Math.PI / 2);

  ctx.shadowBlur = 20;
  ctx.shadowColor = 'rgba(0,150,255,0.4)';

  ctx.fillStyle = '#1a1f2e';
  ctx.beginPath();
  ctx.roundRect(-18, -120, 36, 90, 6);
  ctx.fill();

  ctx.fillStyle = '#141820';
  ctx.beginPath();
  ctx.roundRect(-22, -140, 44, 60, 4);
  ctx.fill();

  ctx.strokeStyle = 'rgba(100,150,255,0.3)';
  ctx.lineWidth = 1;
  ctx.strokeRect(-22, -140, 44, 60);

  ctx.fillStyle = '#0d1017';
  ctx.beginPath();
  ctx.roundRect(-8, -145, 16, 70, 3);
  ctx.fill();

  if (muzzleFlash > 0) {
    const alpha = muzzleFlash;
    ctx.shadowBlur = 40;
    ctx.shadowColor = `rgba(255,200,50,${alpha})`;
    ctx.fillStyle = `rgba(255,200,50,${alpha * 0.9})`;
    ctx.beginPath();
    ctx.ellipse(0, -155, 12 * alpha, 20 * alpha, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = `rgba(255,255,200,${alpha})`;
    ctx.beginPath();
    ctx.ellipse(0, -158, 5 * alpha, 8 * alpha, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.fillStyle = '#252b3d';
  ctx.beginPath();
  ctx.roundRect(-22, -70, 44, 30, [0, 0, 6, 6]);
  ctx.fill();

  for (let i = 0; i < 3; i++) {
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.fillRect(-15 + i * 10, -64, 6, 18);
  }

  ctx.restore();

  gunRecoil *= 0.8;
  if (gunRecoil < 0.01) gunRecoil = 0;
}

function drawCrosshair() {
  const x = mouseX, y = mouseY;
  const size = 20;
  const gap = 6;
  const thickness = 2;

  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.9)';
  ctx.lineWidth = thickness;
  ctx.shadowBlur = 8;
  ctx.shadowColor = 'rgba(255,255,255,0.5)';

  ctx.beginPath();
  ctx.moveTo(x - size, y);
  ctx.lineTo(x - gap, y);
  ctx.moveTo(x + gap, y);
  ctx.lineTo(x + size, y);
  ctx.moveTo(x, y - size);
  ctx.lineTo(x, y - gap);
  ctx.moveTo(x, y + gap);
  ctx.lineTo(x, y + size);
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(x, y, gap, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,50,50,0.8)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  ctx.fillStyle = 'rgba(255,50,50,0.6)';
  ctx.beginPath();
  ctx.arc(x, y, 2, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawBackground() {
  ctx.fillStyle = '#0a0c0f';
  ctx.fillRect(0, 0, W, H);

  for (const s of bgStars) {
    ctx.fillStyle = `rgba(255,255,255,${s.a})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }

  const grad = ctx.createLinearGradient(0, H * 0.6, 0, H);
  grad.addColorStop(0, 'transparent');
  grad.addColorStop(1, 'rgba(0,30,60,0.4)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, H * 0.6, W, H * 0.4);

  ctx.strokeStyle = 'rgba(0,100,255,0.1)';
  ctx.lineWidth = 1;
  const gridSize = 60;
  for (let x = 0; x < W; x += gridSize) {
    ctx.beginPath();
    ctx.moveTo(x, H * 0.6);
    ctx.lineTo(x - 200, H * 1.5);
    ctx.stroke();
  }
  for (let i = 0; i < 8; i++) {
    const yPos = H * 0.6 + i * 30;
    ctx.beginPath();
    ctx.moveTo(0, yPos);
    ctx.lineTo(W, yPos);
    ctx.globalAlpha = 0.05 + i * 0.01;
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

function drawShotRings() {
  for (const ring of shotRings) {
    ctx.beginPath();
    ctx.arc(ring.x, ring.y, ring.r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255,255,255,${ring.life * 0.5})`;
    ctx.lineWidth = 2 * ring.life;
    ctx.stroke();
    ring.r += (ring.maxR - ring.r) * 0.15;
    ring.life -= 0.07;
  }
  shotRings = shotRings.filter(r => r.life > 0);
}

function drawParticles() {
  for (const p of particles) {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.2;
    p.life -= p.decay;
  }
  ctx.globalAlpha = 1;
  particles = particles.filter(p => p.life > 0);
}

function drawFloatingTexts() {
  for (const ft of floatingTexts) {
    ctx.font = `bold ${ft.size}px 'Orbitron', monospace`;
    ctx.fillStyle = ft.color;
    ctx.globalAlpha = ft.life;
    ctx.textAlign = 'center';
    ctx.fillText(ft.text, ft.x, ft.y);
    ft.y += ft.vy;
    ft.life -= 0.025;
  }
  ctx.globalAlpha = 1;
  floatingTexts = floatingTexts.filter(f => f.life > 0);
}

function drawTimer() {
  const pct = timeLeft / maxTime;
  document.getElementById('timerFill').style.width = (pct * 100) + '%';
  document.getElementById('timerFill').style.backgroundPosition = ((1 - pct) * 100) + '% 0';

  const color = pct > 0.5 ? '#00ff88' : pct > 0.25 ? '#ffdc32' : '#ff4444';
  document.getElementById('timeDisplay').style.color = color;
  document.getElementById('timeDisplay').textContent = timeLeft.toFixed(1);
}

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  gameRunning = true;
  score = 0; streak = 0; bestStreak = 0; hits = 0; misses = 0;
  targets = []; particles = []; floatingTexts = [];
  timeLeft = 5.0; maxTime = 5.0; level = 1; timerDecay = 0;
  targetSpawnTime = 0; spawnInterval = 0.6;
  maxTargetsOnScreen = 2; waveTimer = 0; waveCooldown = 0; totalHits = 0;
  updateUI();
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

function endGame() {
  gameRunning = false;
  const acc = hits + misses > 0 ? Math.round(hits / (hits + misses) * 100) : 0;

  document.getElementById('finalScore').style.display = 'block';
  document.getElementById('finalScore').textContent = score;
  document.getElementById('finalLabel').style.display = 'block';
  document.getElementById('finalStats').style.display = 'flex';
  document.getElementById('fHits').textContent = hits;
  document.getElementById('fMisses').textContent = misses;
  document.getElementById('fAcc').textContent = acc + '%';
  document.getElementById('fBest').textContent = bestStreak;
  document.getElementById('startBtn').textContent = 'PLAY AGAIN';
  document.getElementById('overlay').style.display = 'flex';
}

function gameLoop(now) {
  if (!gameRunning) return;
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;

  timeLeft -= dt * (0.5 + timerDecay);
  timerDecay += dt * 0.015;
  maxTime = Math.max(2.0, 5.0 - timerDecay * 0.5);

  waveTimer += dt;
  waveCooldown = Math.max(0, waveCooldown - dt);

  const elapsed = timerDecay / 0.015;
  maxTargetsOnScreen = Math.min(6, 2 + Math.floor(elapsed / 8));
  spawnInterval = Math.max(0.18, 0.6 - elapsed * 0.025);

  const activeCount = targets.filter(t => !t.hit).length;

  if (waveCooldown <= 0 && waveTimer >= spawnInterval) {
    waveTimer = 0;
    const waveSize = Math.min(maxTargetsOnScreen - activeCount, 1 + Math.floor(elapsed / 12));
    for (let i = 0; i < waveSize; i++) {
      if (targets.filter(t => !t.hit).length < maxTargetsOnScreen) {
        const t = new Target();
        t.x += i * 20;
        targets.push(t);
      }
    }
    if (elapsed > 6) waveCooldown = spawnInterval * 0.5;
  }

  targets = targets.filter(t => !t.hit || t.opacity > 0);
  targets.forEach(t => t.update(dt));

  muzzleFlash *= 0.7;

  if (timeLeft <= 0) {
    timeLeft = 0;
    drawBackground();
    targets.forEach(t => t.draw());
    drawGun();
    drawCrosshair();
    drawTimer();
    endGame();
    return;
  }

  drawBackground();
  drawShotRings();
  targets.forEach(t => t.draw());
  drawParticles();
  drawFloatingTexts();
  drawGun();
  drawCrosshair();
  drawTimer();

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(() => {});
</script>
</body>
</html>
